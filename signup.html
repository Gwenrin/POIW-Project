<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>POIW-Project</title>
</head>
<body>
    <header class="navbar">
        <div class="navbar__container">
            <a href="index.html" class="navbar__main">OCR</a>
            <nav class="navbar__nav" id="main-nav">
                <ul class="nav-list">
                    <li><a href="index.html" class="nav-link">
                        Home
                    </a></li>
                    <li><a href="history.html" class="nav-link">
                        Previous files
                    </a></li>
                    <li><a href="about.html" class="nav-link">
                        About the project
                    </a></li>
                    <li><a href="license.html" class="nav-link">
                        License
                    </a></li>
                    <li><a href="login.html" class="nav-link">
                        Log in
                    </a></li>
                </ul>
            </nav>
            <button class="navbar__mobile-toggle" id="mobile-toggle" aria-label="Open Menu">
                <svg width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M3,6H21V8H3V6M3,11H21V13H3V11M3,16H21V18H3V16Z" /></svg>
            </button>
        </div>
    </header>

    <div class="mobile-menu-pane" id="mobile-menu-pane"></div>
    <main class="content"><h1>WIP signup form</h1>
        <form action="" method="post">
            <div>
                <label for="email">
                        Mail address:
                </label>
                <input type = "text" id= "email" name="email" required>
            </div>
             <div>
                <label for="first">
                        Username:
                </label>
                <input type = "text" id= "first" name="first" required>
            </div>
            <div>        
                <label for = "password">
                        Password:
                </label>
                <input type = "password" id="password" name="password" required>
            </div>
            <div>  
                <label for = "password-repeat">
                        Repeat password:
                </label>
                <input type = "password" id="password" name="password-repeat" required>
            </div>
            <div> 
                <label>
                    <input type="checkbox" checked="checked" name="remember"> Remember me
                </label>
            </div>    
            <p>By creating an account you agree to our <a href=''>Terms & Privacy</a></p>

            <div>
                <button type = "button">Cancel</button>
                <button type = "submit">Submit</button>
            </div>
        </form>    

        
    </main>
    
<script> //wstępny skrypt do obsługi na urządzeniach mobilnych
    document.addEventListener('DOMContentLoaded', () => {
        const mobileToggle = document.getElementById('mobile-toggle');
        const mobileMenuPane = document.getElementById('mobile-menu-pane');
        const mainNav = document.getElementById('main-nav');
        if(mainNav) {
            mobileMenuPane.innerHTML = mainNav.innerHTML;
        }
        if(mobileToggle) {
            mobileToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                mobileMenuPane.classList.toggle('is-open');
            });
        }
    });
    </script>
</body>
</html>
